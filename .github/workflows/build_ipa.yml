name: Build IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Set iOS Info.plist values
        run: |
          flutter build ios --release --no-codesign
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r Wispie.ipa Payload
          mv Wispie.ipa ../../../
          cd ../../../../
          rm -rf build/ios/iphoneos/Payload

      - name: Find IPA
        id: find_ipa
        run: |
          IPA_PATH="build/ios/Wispie.ipa"
          echo "Found IPA at: $IPA_PATH"
          echo "ipa_path=$IPA_PATH" >> $GITHUB_OUTPUT
      
      - name: Upload IPA
        if: steps.find_ipa.outputs.ipa_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: wispie-release-ipa
          path: ${{ steps.find_ipa.outputs.ipa_path }}
          retention-days: 7
